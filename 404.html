<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>페이지 이동 중...</title>
  <!-- 1. 구글 등 검색 엔진에게 대표 주소가 Firebase 호스팅임을 인지시킴 -->
  <link rel="canonical" href="https://aicreateworkshop.web.app/">
  <!-- 2. 브라우저 자동 새로고침(새 주소로 이동) -->
  <meta http-equiv="refresh" content="0; url=https://aicreateworkshop.web.app/">
  
  <script>
    (function() {
      // 깃허브 특유의 하위 폴더 경로(/aivideostudio)를 떼어내고 Firebase 주소와 결합
      var newPath = window.location.pathname.replace("/aivideostudio", "");
      var targetUrl = "https://aicreateworkshop.web.app" + newPath + window.location.search + window.location.hash;
      window.location.replace(targetUrl);
    })();
  </script>
</head>
<body>
  <p>새로운 주소로 이동하고 있습니다. 자동으로 이동하지 않으면 <a href="https://aicreateworkshop.web.app/">여기</a>를 클릭하세요.</p>
</body>
</html>
