<!DOCTYPE html>
<html lang="ko">

<head>
  <script>
    (function () {
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        || (window.innerWidth < 768);
      if (!isMobile) {
        var path = window.location.pathname;
        var page = path.substring(path.lastIndexOf('/') + 1) || 'mypage.html';
        window.location.href = '../' + page;
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 영상공방 모바일 회원 마이페이지. 나의 실시간 문의 내역을 모바일에서 간편하게 조회하세요.">
  <title>마이페이지 | AI 영상공방 모바일</title>
  <link rel="stylesheet" href="./styles.css">
  
  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="../firebase-config.js?v=1.0.2"></script>

  <style>
    body {
      background-color: #12100E;
      color: #E6E1DC;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }

    .mypage-container {
      padding: 70px 15px 30px 15px;
    }

    .profile-card {
      background: rgba(30, 27, 24, 0.7);
      border: 1px solid rgba(200, 142, 114, 0.12);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .profile-avatar {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--color-accent, #C88E72) 0%, #B5795C 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.25rem;
      font-weight: bold;
      color: #FFF;
      box-shadow: 0 4px 10px rgba(200, 142, 114, 0.25);
    }

    .profile-text h2 {
      font-size: 1.15rem;
      color: #FFF;
      margin: 0;
    }

    .profile-text p {
      font-size: 0.75rem;
      color: #9E948A;
      margin-top: 0.15rem;
    }

    .section-title {
      font-size: 1.15rem;
      color: #FFF;
      margin-bottom: 1rem;
      padding-left: 0.25rem;
      border-left: 3px solid var(--color-accent, #C88E72);
    }

    /* Cards for Inquiries */
    .inquiry-card {
      background: rgba(30, 27, 24, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 1.1rem;
      margin-bottom: 1rem;
      position: relative;
      transition: border-color 0.2s;
    }

    .inquiry-card:active {
      border-color: rgba(200, 142, 114, 0.3);
      background: rgba(255, 255, 255, 0.02);
    }

    .inquiry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .inquiry-id {
      font-size: 0.75rem;
      color: #9E948A;
    }

    .inquiry-date {
      font-size: 0.75rem;
      color: #9E948A;
    }

    .inquiry-service {
      font-size: 0.95rem;
      font-weight: 600;
      color: #FFF;
      margin-bottom: 0.5rem;
    }

    .inquiry-msg {
      font-size: 0.8rem;
      color: #D2CBC4;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    /* Badges */
    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .status-wait {
      background-color: rgba(222, 178, 91, 0.12);
      color: #DEB25B;
      border: 1px solid rgba(222, 178, 91, 0.2);
    }

    .status-ing {
      background-color: rgba(76, 139, 226, 0.12);
      color: #4C8BE2;
      border: 1px solid rgba(76, 139, 226, 0.2);
    }

    .status-done {
      background-color: rgba(94, 186, 125, 0.12);
      color: #5EBA7D;
      border: 1px solid rgba(94, 186, 125, 0.2);
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      box-sizing: border-box;
      text-decoration: none;
    }

    .btn-primary {
      background-color: var(--color-accent, #C88E72);
      color: #FFF;
      border: none;
    }

    .btn-outline {
      border: 1px solid rgba(200, 142, 114, 0.3);
      color: var(--color-accent, #C88E72);
      background: transparent;
    }

    /* Modal layout */
    .mypage-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(18, 16, 14, 0.9);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mypage-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #1E1B18;
      border: 1px solid rgba(200, 142, 114, 0.2);
      width: 90%;
      border-radius: 12px;
      overflow: hidden;
    }

    .modal-header {
      background: rgba(255, 255, 255, 0.02);
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 1.25rem 1rem;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .modal-label {
      font-size: 0.7rem;
      color: #9E948A;
      margin-bottom: 0.20rem;
      display: block;
    }

    .modal-value {
      color: #FFF;
      background: rgba(255, 255, 255, 0.02);
      padding: 0.6rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      word-break: break-all;
    }

    .modal-close-btn {
      background: none;
      border: none;
      color: #9E948A;
      font-size: 1.25rem;
    }

    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
    }

    .empty-icon {
      font-size: 2.5rem;
      color: rgba(200, 142, 114, 0.3);
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>

  <!-- Loading Cover -->
  <div id="authOverlay" class="login-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; opacity: 1; transition: opacity 0.4s ease; background-color: #12100E; z-index: 9999; flex-direction: column; justify-content: center; align-items: center;">
    <div style="text-align: center;">
      <div style="font-family: var(--font-serif); font-size: 1.5rem; color: #FFF; margin-bottom: 0.5rem;">AI 영상공방</div>
      <div style="color: var(--color-accent); font-size: 0.8rem; letter-spacing: 1px;">프로필 및 문의 내역 조회 중...</div>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="container nav-container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="logo" style="font-size: 1.1rem;">
        AI 영상공방 <span style="font-size: 0.6rem; color: var(--color-accent); font-weight: bold;">My Page</span>
      </a>
      <button id="logoutBtn" style="background:none; border:1px solid rgba(226, 76, 76, 0.4); color:#E24C4C; padding:0.25rem 0.5rem; border-radius:4px; font-size:0.7rem; cursor:pointer;">로그아웃</button>
    </div>
  </header>

  <main class="mypage-container">
    
    <!-- Profile Greet Card -->
    <div class="profile-card">
      <div class="profile-header">
        <div id="profileAvatar" class="profile-avatar">-</div>
        <div class="profile-text">
          <h2>안녕하세요, <span id="userName" style="color: var(--color-accent);">고객</span>님.</h2>
          <p id="userEmail">-</p>
          <button id="withdrawBtn" style="background: none; border: none; padding: 0; color: #E24C4C; font-size: 0.7rem; text-decoration: underline; cursor: pointer; margin-top: 0.25rem;">회원탈퇴</button>
        </div>
      </div>
      <a href="contact.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">새 상담 신청서 작성하기</a>
    </div>

    <!-- Inquiries Title -->
    <h3 class="section-title">나의 문의 내역</h3>

    <!-- Loading Screen -->
    <div id="inquiryLoadingText" style="text-align: center; color: #9E948A; padding: 2rem 0; font-size: 0.8rem;">
      문의 내역을 실시간으로 가져오는 중입니다...
    </div>

    <!-- Inquiry Cards Container -->
    <div id="inquiryCardsContainer" style="display: none;">
      <!-- Cards injected dynamically -->
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-icon">📂</div>
      <h4 style="font-size: 1rem; color: #FFF; margin-bottom: 0.35rem;">접수된 문의 내역이 없습니다.</h4>
      <p style="color: #9E948A; font-size: 0.75rem; margin-bottom: 1.25rem;">무료로 시네마틱 견적 및 기획안을 신청해 보세요.</p>
      <a href="contact.html" class="btn btn-outline" style="font-size: 0.8rem; padding: 0.6rem;">무료 상담 신청 ➔</a>
    </div>

  </main>

  <!-- Detail Modal -->
  <div id="detailModal" class="mypage-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 style="font-family: var(--font-serif); font-size: 1rem; color: #FFF; margin: 0;">상담 문의 상세 내역</h3>
        <button id="closeModalBtn" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
          <div>
            <span class="modal-label">신청번호 (ID)</span>
            <div id="modalId" class="modal-value">-</div>
          </div>
          <div>
            <span class="modal-label">진행 상태</span>
            <div><span id="modalStatus" class="status-badge status-wait">-</span></div>
          </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
          <div>
            <span class="modal-label">신청일시</span>
            <div id="modalDate" class="modal-value">-</div>
          </div>
          <div>
            <span class="modal-label">선택 서비스</span>
            <div id="modalService" class="modal-value">-</div>
          </div>
        </div>
        <div>
          <span class="modal-label">상세 요구사항</span>
          <div id="modalMessage" class="modal-value" style="white-space: pre-wrap; min-height: 100px; max-height: 200px; overflow-y: auto; margin-bottom: 0;">-</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SHEET_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxODU1sAOm8l-Ce0fz4jEDULzde6Edf0S9tI-b8oo6geQ_opB3Ibx__HlgW-9zJkfNBHg/exec';
    const isCorrectScriptUrl = GOOGLE_SHEET_WEB_APP_URL && GOOGLE_SHEET_WEB_APP_URL.includes('script.google.com');

    document.addEventListener('DOMContentLoaded', () => {
      const authOverlay = document.getElementById('authOverlay');
      const logoutBtn = document.getElementById('logoutBtn');
      const profileAvatar = document.getElementById('profileAvatar');
      const userName = document.getElementById('userName');
      const userEmail = document.getElementById('userEmail');
      const withdrawBtn = document.getElementById('withdrawBtn');

      const inquiryLoadingText = document.getElementById('inquiryLoadingText');
      const inquiryCardsContainer = document.getElementById('inquiryCardsContainer');
      const emptyState = document.getElementById('emptyState');

      const detailModal = document.getElementById('detailModal');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const modalId = document.getElementById('modalId');
      const modalStatus = document.getElementById('modalStatus');
      const modalDate = document.getElementById('modalDate');
      const modalService = document.getElementById('modalService');
      const modalMessage = document.getElementById('modalMessage');

      let myInquiries = [];

      const serviceLabels = {
        ad: 'AI 광고 영상',
        web: '홈페이지 제작',
        shorts: '쇼츠 제작',
        animation: '3D 애니메이션',
        ccm: '뮤직비디오',
        etc: '기타/대기'
      };

      // 1. Firebase Auth Monitor
      auth.onAuthStateChanged((user) => {
        if (user) {
          // If admin, redirect to admin console instead
          if (isAdmin(user.email)) {
            window.location.href = 'admin.html';
            return;
          }

          // Populate Profile
          const displayName = user.displayName || '고객';
          userName.innerText = displayName;
          userEmail.innerText = user.email;
          profileAvatar.innerText = displayName.substring(0, 1);

          // Hide Auth Check Screen
          if (authOverlay) {
            authOverlay.style.opacity = '0';
            setTimeout(() => {
              authOverlay.style.display = 'none';
            }, 400);
          }

          // Fetch user specific data
          fetchInquiries(user.email);
        } else {
          // Send to login if not logged in
          window.location.href = 'login.html';
        }
      });

      // 2. Logout Binder
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          if (confirm("로그아웃 하시겠습니까?")) {
            auth.signOut().then(() => {
              window.location.href = 'login.html';
            });
          }
        });
      }

      // 2.1 Withdrawal Binder
      if (withdrawBtn) {
        withdrawBtn.addEventListener('click', () => {
          if (confirm("정말로 회원 탈퇴를 하시겠습니까?\n탈퇴 시 계정은 복구할 수 없습니다.")) {
            const user = auth.currentUser;
            if (user) {
              user.delete()
                .then(() => {
                  alert("회원 탈퇴가 완료되었습니다. 그동안 이용해 주셔서 감사합니다.");
                  window.location.href = "index.html";
                })
                .catch((err) => {
                  console.error("회원탈퇴 실패:", err);
                  if (err.code === 'auth/requires-recent-login') {
                    alert("보안을 위해 최근 로그인 기록이 필요합니다. 로그아웃 후 다시 로그인하여 회원 탈퇴를 진행해 주세요.");
                    auth.signOut().then(() => {
                      window.location.href = "login.html";
                    });
                  } else {
                    alert("회원 탈퇴 중 오류가 발생했습니다: " + err.message);
                  }
                });
            }
          }
        });
      }

      // 3. Fetch Inquiries from Google Sheet API
      const fetchInquiries = (email) => {
        if (!isCorrectScriptUrl) {
          showEmpty();
          return;
        }

        const url = `${GOOGLE_SHEET_WEB_APP_URL}?email=${encodeURIComponent(email)}&_=${Date.now()}`;
        
        fetch(url)
          .then(res => {
            if (!res.ok) throw new Error("네트워크 오류");
            return res.json();
          })
          .then(data => {
            if (Array.isArray(data)) {
              // '테스트' 또는 'test'가 들어간 항목 필터링 (대소문자 무관)
              myInquiries = data.filter(item => {
                const msg = (item.message || '').toLowerCase();
                const name = (item.name || '').toLowerCase();
                return !msg.includes('테스트') && !msg.includes('test') && !name.includes('테스트') && !name.includes('test');
              });
              
              if (myInquiries.length > 0) {
                renderCards();
              } else {
                showEmpty();
              }
            } else {
              console.error("올바르지 않은 응답:", data);
              showEmpty();
            }
          })
          .catch(err => {
            console.error("데이터 로드 실패:", err);
            showEmpty();
          });
      };

      const showEmpty = () => {
        inquiryLoadingText.style.display = 'none';
        inquiryCardsContainer.style.display = 'none';
        emptyState.style.display = 'block';
      };

      // 4. Render Cards
      const renderCards = () => {
        inquiryLoadingText.style.display = 'none';
        emptyState.style.display = 'none';
        inquiryCardsContainer.style.display = 'block';
        inquiryCardsContainer.innerHTML = '';

        myInquiries.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'inquiry-card';
          
          let statusHtml = '';
          if (item.status === 'wait') {
            statusHtml = '<span class="status-badge status-wait">상담 대기</span>';
          } else if (item.status === 'ing') {
            statusHtml = '<span class="status-badge status-ing">상담 중</span>';
          } else if (item.status === 'done') {
            statusHtml = '<span class="status-badge status-done">상담 완료</span>';
          } else {
            statusHtml = `<span class="status-badge">${item.status}</span>`;
          }

          const serviceText = serviceLabels[item.service] || item.service;
          const truncatedMessage = item.message.length > 60 ? item.message.substring(0, 60) + '...' : item.message;

          // 역순 인덱스로 번호 지정 (오래된 글이 1번)
          const displayNum = myInquiries.length - index;

          card.innerHTML = `
            <div class="inquiry-header">
              <span class="inquiry-id">신청번호: #${displayNum}</span>
              ${statusHtml}
            </div>
            <div class="inquiry-service">${serviceText}</div>
            <div class="inquiry-msg">${truncatedMessage}</div>
            <div class="inquiry-date" style="text-align: right; margin-top: 0.25rem;">${item.date}</div>
          `;

          card.addEventListener('click', () => openModal(item, displayNum));
          inquiryCardsContainer.appendChild(card);
        });
      };

      // 5. Modal Control
      const openModal = (item, displayNum) => {
        modalId.innerText = displayNum;
        modalDate.innerText = item.date;
        modalService.innerText = serviceLabels[item.service] || item.service;
        modalMessage.innerText = item.message;

        modalStatus.className = 'status-badge';
        if (item.status === 'wait') {
          modalStatus.classList.add('status-wait');
          modalStatus.innerText = '상담 대기';
        } else if (item.status === 'ing') {
          modalStatus.classList.add('status-ing');
          modalStatus.innerText = '상담 중';
        } else if (item.status === 'done') {
          modalStatus.classList.add('status-done');
          modalStatus.innerText = '상담 완료';
        } else {
          modalStatus.innerText = item.status;
        }

        detailModal.classList.add('active');
      };

      const closeModal = () => {
        detailModal.classList.remove('active');
      };

      if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
      detailModal.addEventListener('click', (e) => {
        if (e.target === detailModal) closeModal();
      });
    });
  </script>
</body>

</html>
