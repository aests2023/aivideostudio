<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 영상공방 관리자 로그인">
  <title>로그인 | AI 영상공방 관리자</title>
  <link rel="stylesheet" href="./styles.css">
  
  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="./firebase-config.js?v=1.0.2"></script>

  <style>
    body {
      background-color: #0E0C0A;
      color: #E6E1DC;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem;
      box-sizing: border-box;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background animations */
    .ambient-bg {
      position: fixed;
      top: -30%;
      left: -30%;
      width: 160%;
      height: 160%;
      background: radial-gradient(circle at 30% 30%, rgba(200, 142, 114, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(190, 178, 91, 0.04) 0%, transparent 50%),
                  radial-gradient(circle at 50% 10%, rgba(226, 76, 76, 0.03) 0%, transparent 35%);
      z-index: 1;
      pointer-events: none;
      animation: drift 20s infinite alternate linear;
    }

    @keyframes drift {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(5deg); }
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      z-index: 10;
    }

    .login-card {
      background: rgba(30, 27, 24, 0.65);
      border: 1px solid rgba(200, 142, 114, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      margin-bottom: 2.25rem;
    }

    .logo-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.85rem;
      color: #FFF;
      letter-spacing: 1px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .logo-tag {
      font-size: 0.72rem;
      color: var(--color-accent, #C88E72);
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border: 1px solid rgba(200, 142, 114, 0.25);
      border-radius: 4px;
      background: rgba(200, 142, 114, 0.05);
    }

    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .form-label {
      font-size: 0.75rem;
      color: #9E948A;
      margin-bottom: 0.4rem;
      display: block;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: #FFF;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .form-input:focus {
      border-color: rgba(200, 142, 114, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 10px rgba(200, 142, 114, 0.1);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--color-accent, #C88E72);
      color: #FFF;
      border-radius: 8px;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1.5rem;
      box-shadow: 0 4px 15px rgba(200, 142, 114, 0.2);
    }

    .btn-submit:hover {
      background-color: #B5795C;
      box-shadow: 0 6px 20px rgba(200, 142, 114, 0.35);
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(1px);
    }

    .btn-submit:disabled {
      background-color: #554A42;
      box-shadow: none;
      cursor: not-allowed;
      color: #8C8075;
    }

    .error-box {
      background: rgba(226, 76, 76, 0.1);
      border: 1px solid rgba(226, 76, 76, 0.2);
      border-radius: 8px;
      color: #FF7878;
      font-size: 0.82rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
      display: none;
      line-height: 1.4;
    }

    .form-footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #9E948A;
    }

    .form-link {
      color: var(--color-accent, #C88E72);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.25s ease;
      margin-left: 0.35rem;
    }

    .form-link:hover {
      color: #FFF;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="ambient-bg"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo-area">
        <h1 class="logo-title"><a href="index.html" style="color: #FFF; text-decoration: none; transition: opacity 0.2s ease;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">AI 영상공방</a></h1>
        <span class="logo-tag">Member Sign In</span>
      </div>

      <div id="errorBox" class="error-box"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">이메일 주소</label>
          <input type="email" id="email" class="form-input" placeholder="user@example.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
            <label for="password" class="form-label" style="margin-bottom: 0;">비밀번호</label>
            <a href="#" id="btnResetPassword" class="form-link" style="font-size: 0.72rem; margin-left: 0;">비밀번호를 잊으셨나요?</a>
          </div>
          <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요." required autocomplete="current-password">
        </div>
        <button type="submit" id="submitBtn" class="btn-submit">로그인</button>
        
        <div style="display: flex; align-items: center; margin: 1.5rem 0; color: #9E948A; font-size: 0.8rem;">
          <hr style="flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.08); margin-right: 1rem;">
          <span>또는</span>
          <hr style="flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.08); margin-left: 1rem;">
        </div>

        <button type="button" id="btnGoogleLogin" class="btn-submit" style="background-color: #FFF; color: #12100E; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0; box-shadow: 0 4px 15px rgba(255,255,255,0.05); font-weight: 600;">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91c1.7-1.56 2.69-3.86 2.69-6.6z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.91-2.26a5.6 5.6 0 0 1-8.55-3v-2.26H.53v2.26C2.01 14.53 5.25 18 9 18z"/>
            <path fill="#FBBC05" d="M3.5 10.54a5.41 5.41 0 0 1 0-3.08V5.2H.53a8.99 8.99 0 0 0 0 7.6l2.97-2.26z"/>
            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.3C13.46.88 11.43 0 9 0 5.25 0 2.01 3.47.53 7.2l2.97 2.26c.72-2.14 2.73-3.88 5.5-3.88z"/>
          </svg>
          구글 계정으로 로그인
        </button>
      </form>

      <div class="form-footer">
        아직 계정이 없으신가요?
        <a href="signup.html" class="form-link">신규 가입하기 ➔</a>
      </div>
      <div class="form-footer" style="margin-top: 1rem; border-top: 1px dashed rgba(255,255,255,0.08); padding-top: 1rem;">
        <a href="index.html" class="form-link" style="color: #9E948A; font-size: 0.82rem;">홈으로 돌아가기 ➔</a>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SHEET_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxODU1sAOm8l-Ce0fz4jEDULzde6Edf0S9tI-b8oo6geQ_opB3Ibx__HlgW-9zJkfNBHg/exec';

    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorBox = document.getElementById('errorBox');
      const submitBtn = document.getElementById('submitBtn');

      let isLoggingIn = false;

      const redirectToPage = (email) => {
        if (isAdmin(email)) {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'mypage.html';
        }
      };

      // 이미 로그인되어 있는지 체크하여 회원 역할(관리자 vs 일반 회원)에 맞게 리다이렉트
      auth.onAuthStateChanged(user => {
        if (user && !isLoggingIn) {
          redirectToPage(user.email);
        }
      });

      const showError = (message) => {
        errorBox.innerText = message;
        errorBox.style.display = 'block';
      };

      const clearError = () => {
        errorBox.innerText = '';
        errorBox.style.display = 'none';
      };

      // 파이어베이스 에러 코드 한글 번역
      const translateError = (code) => {
        switch (code) {
          case 'auth/invalid-email':
            return '올바르지 않은 이메일 형식입니다.';
          case 'auth/user-disabled':
            return '사용 중지된 계정입니다. 관리자에게 문의하세요.';
          case 'auth/user-not-found':
          case 'auth/wrong-password':
          case 'auth/invalid-credential':
            return '이메일 주소 또는 비밀번호가 올바르지 않습니다.';
          case 'auth/too-many-requests':
            return '로그인 시도가 너무 많아 일시적으로 차단되었습니다. 잠시 후 다시 시도해 주세요.';
          default:
            return '로그인 중 오류가 발생했습니다. 다시 확인해 주세요.';
        }
      };

      const btnResetPassword = document.getElementById('btnResetPassword');
      if (btnResetPassword) {
        btnResetPassword.addEventListener('click', (e) => {
          e.preventDefault();
          const email = emailInput.value.trim();
          if (!email) {
            showError('비밀번호를 재설정하려면 먼저 이메일 주소를 입력해 주세요.');
            return;
          }
          
          btnResetPassword.style.pointerEvents = 'none';
          btnResetPassword.innerText = '전송 중...';
          clearError();
          
          auth.sendPasswordResetEmail(email)
            .then(() => {
              alert(`${email} 주소로 비밀번호 재설정 이메일이 발송되었습니다. 메일함을 확인해 주세요.`);
              btnResetPassword.style.pointerEvents = 'auto';
              btnResetPassword.innerText = '비밀번호를 잊으셨나요?';
            })
            .catch((error) => {
              console.error("비밀번호 재설정 메일 발송 에러:", error);
              showError('비밀번호 재설정 메일 발송에 실패했습니다. (' + translateError(error.code) + ')');
              btnResetPassword.style.pointerEvents = 'auto';
              btnResetPassword.innerText = '비밀번호를 잊으셨나요?';
            });
        });
      }

      const btnGoogleLogin = document.getElementById('btnGoogleLogin');
      if (btnGoogleLogin) {
        btnGoogleLogin.addEventListener('click', (e) => {
          e.preventDefault();
          isLoggingIn = true;
          clearError();
          
          const provider = new firebase.auth.GoogleAuthProvider();
          auth.signInWithPopup(provider)
            .then((result) => {
              const user = result.user;
              const isNewUser = result.additionalUserInfo ? result.additionalUserInfo.isNewUser : false;
              
              if (isNewUser) {
                // 신규 가입인 경우 웰컴 메일 발송 후 이동
                const isCorrectScriptUrl = GOOGLE_SHEET_WEB_APP_URL && GOOGLE_SHEET_WEB_APP_URL.includes('script.google.com');
                if (isCorrectScriptUrl) {
                  const welcomeUrl = `${GOOGLE_SHEET_WEB_APP_URL}?action=sendWelcomeEmail&email=${encodeURIComponent(user.email)}&name=${encodeURIComponent(user.displayName || '고객')}`;
                  fetch(welcomeUrl, { mode: 'no-cors' })
                    .then(() => redirectToPage(user.email))
                    .catch(err => {
                      console.error("웰컴 메일 전송 실패:", err);
                      redirectToPage(user.email);
                    });
                } else {
                  redirectToPage(user.email);
                }
              } else {
                // 기존 유저인 경우 즉시 이동
                redirectToPage(user.email);
              }
            })
            .catch((error) => {
              isLoggingIn = false;
              console.error("구글 로그인 에러:", error);
              showError(translateError(error.code));
            });
        });
      }

      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        clearError();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showError('이메일과 비밀번호를 입력해 주세요.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = '로그인 중...';

        auth.signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // 성공 시 onAuthStateChanged 이벤트가 트리거되어 리다이렉트 처리됩니다.
            console.log("로그인 성공:", userCredential.user.email);
          })
          .catch((error) => {
            console.error("로그인 에러:", error);
            showError(translateError(error.code));
            submitBtn.disabled = false;
            submitBtn.innerText = '로그인';
          });
      });
    });
  </script>
</body>
</html>
