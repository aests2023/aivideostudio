<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI 영상공방 신규 관리자 회원가입">
  <title>회원가입 | AI 영상공방 관리자</title>
  <link rel="stylesheet" href="./styles.css">
  
  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="./firebase-config.js?v=1.0.2"></script>

  <style>
    body {
      background-color: #0E0C0A;
      color: #E6E1DC;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem;
      box-sizing: border-box;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background animations */
    .ambient-bg {
      position: fixed;
      top: -30%;
      left: -30%;
      width: 160%;
      height: 160%;
      background: radial-gradient(circle at 70% 30%, rgba(200, 142, 114, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 30% 70%, rgba(190, 178, 91, 0.04) 0%, transparent 50%),
                  radial-gradient(circle at 50% 90%, rgba(226, 76, 76, 0.03) 0%, transparent 35%);
      z-index: 1;
      pointer-events: none;
      animation: drift 25s infinite alternate linear;
    }

    @keyframes drift {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-5deg); }
    }

    .signup-container {
      width: 100%;
      max-width: 460px;
      padding: 20px;
      z-index: 10;
    }

    .signup-card {
      background: rgba(30, 27, 24, 0.65);
      border: 1px solid rgba(200, 142, 114, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      margin-bottom: 2.25rem;
    }

    .logo-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.85rem;
      color: #FFF;
      letter-spacing: 1px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .logo-tag {
      font-size: 0.72rem;
      color: var(--color-accent, #C88E72);
      letter-spacing: 2px;
      font-weight: 600;
      text-transform: uppercase;
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border: 1px solid rgba(200, 142, 114, 0.25);
      border-radius: 4px;
      background: rgba(200, 142, 114, 0.05);
    }

    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .form-label {
      font-size: 0.75rem;
      color: #9E948A;
      margin-bottom: 0.4rem;
      display: block;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: #FFF;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .form-input:focus {
      border-color: rgba(200, 142, 114, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 10px rgba(200, 142, 114, 0.1);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--color-accent, #C88E72);
      color: #FFF;
      border-radius: 8px;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1.5rem;
      box-shadow: 0 4px 15px rgba(200, 142, 114, 0.2);
    }

    .btn-submit:hover {
      background-color: #B5795C;
      box-shadow: 0 6px 20px rgba(200, 142, 114, 0.35);
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      background-color: #554A42;
      box-shadow: none;
      cursor: not-allowed;
      color: #8C8075;
    }

    .error-box {
      background: rgba(226, 76, 76, 0.1);
      border: 1px solid rgba(226, 76, 76, 0.2);
      border-radius: 8px;
      color: #FF7878;
      font-size: 0.82rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
      display: none;
      line-height: 1.4;
    }

    .form-footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #9E948A;
    }

    .form-link {
      color: var(--color-accent, #C88E72);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.25s ease;
      margin-left: 0.35rem;
    }

    .form-link:hover {
      color: #FFF;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="ambient-bg"></div>

  <div class="signup-container">
    <div class="signup-card">
      <div class="logo-area">
        <h1 class="logo-title">AI 영상공방</h1>
        <span class="logo-tag">Member Register</span>
      </div>

      <div id="errorBox" class="error-box"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="username" class="form-label">이름 / 닉네임</label>
          <input type="text" id="username" class="form-input" placeholder="홍길동" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email" class="form-label">이메일 주소</label>
          <input type="email" id="email" class="form-input" placeholder="user@example.com" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password" class="form-label">비밀번호 (6자 이상)</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요." required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
          <input type="password" id="passwordConfirm" class="form-input" placeholder="비밀번호를 한번 더 입력하세요." required autocomplete="new-password">
        </div>
        <button type="submit" id="submitBtn" class="btn-submit">계정 만들기</button>
      </form>

      <div class="form-footer">
        이미 계정이 있으신가요?
        <a href="login.html" class="form-link">로그인하기 ➔</a>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SHEET_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxODU1sAOm8l-Ce0fz4jEDULzde6Edf0S9tI-b8oo6geQ_opB3Ibx__HlgW-9zJkfNBHg/exec';

    document.addEventListener('DOMContentLoaded', () => {
      const signupForm = document.getElementById('signupForm');
      const usernameInput = document.getElementById('username');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const passwordConfirmInput = document.getElementById('passwordConfirm');
      const errorBox = document.getElementById('errorBox');
      const submitBtn = document.getElementById('submitBtn');

      let isSigningUp = false;

      const redirectToPage = (email) => {
        if (isAdmin(email)) {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'mypage.html';
        }
      };

      // 이미 로그인되어 있는 상태라면 회원 역할(관리자 vs 일반 회원)에 맞게 리다이렉트
      auth.onAuthStateChanged(user => {
        if (user && !isSigningUp) {
          redirectToPage(user.email);
        }
      });

      const showError = (message) => {
        errorBox.innerText = message;
        errorBox.style.display = 'block';
      };

      const clearError = () => {
        errorBox.innerText = '';
        errorBox.style.display = 'none';
      };

      // 파이어베이스 회원가입 에러 번역
      const translateError = (code) => {
        switch (code) {
          case 'auth/email-already-in-use':
            return '이미 사용 중인 이메일 주소입니다.';
          case 'auth/invalid-email':
            return '올바르지 않은 이메일 형식입니다.';
          case 'auth/operation-not-allowed':
            return '이메일 가입이 비활성화 상태입니다. Firebase 콘솔 설정을 확인하세요.';
          case 'auth/weak-password':
            return '비밀번호 강도가 약합니다. 6자리 이상의 비밀번호를 설정해 주세요.';
          default:
            return '가입 진행 중 알 수 없는 오류가 발생했습니다. 다시 시도해 주세요.';
        }
      };

      signupForm.addEventListener('submit', (e) => {
        e.preventDefault();
        clearError();

        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const passwordConfirm = passwordConfirmInput.value;

        // Front-end Validation
        if (!username || !email || !password || !passwordConfirm) {
          showError('모든 항목을 입력해 주세요.');
          return;
        }

        if (password.length < 6) {
          showError('비밀번호는 최소 6자 이상이어야 합니다.');
          return;
        }

        if (password !== passwordConfirm) {
          showError('비밀번호가 서로 일치하지 않습니다. 다시 입력해 주세요.');
          return;
        }

        isSigningUp = true;
        submitBtn.disabled = true;
        submitBtn.innerText = '계정 생성 중...';

        auth.createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            const user = userCredential.user;
            
            // Firebase 유저 프로필에 닉네임 업데이트
            return user.updateProfile({
              displayName: username
            }).then(() => {
              console.log("계정 생성 및 이름 설정 완료:", user.email);
              
              // 신규 회원 웰컴 메일 발송 API 호출
              const isCorrectScriptUrl = GOOGLE_SHEET_WEB_APP_URL && GOOGLE_SHEET_WEB_APP_URL.includes('script.google.com');
              if (isCorrectScriptUrl) {
                const welcomeUrl = `${GOOGLE_SHEET_WEB_APP_URL}?action=sendWelcomeEmail&email=${encodeURIComponent(email)}&name=${encodeURIComponent(username)}`;
                return fetch(welcomeUrl, { mode: 'no-cors' })
                  .then(() => {
                    redirectToPage(user.email);
                  })
                  .catch(err => {
                    console.error("웰컴 메일 전송 실패:", err);
                    redirectToPage(user.email);
                  });
              } else {
                redirectToPage(user.email);
              }
            });
          })
          .catch((error) => {
            isSigningUp = false;
            console.error("회원가입 에러:", error);
            showError(translateError(error.code));
            submitBtn.disabled = false;
            submitBtn.innerText = '계정 만들기';
          });
      });
    });
  </script>
</body>
</html>
